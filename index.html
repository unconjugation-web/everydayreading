<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매3비 우리반 정원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#bfe9e0;
    --sky-bottom:#fff3d6;
    --soil:#8b5e3c;
    --soil-dark:#6e4a2e;
    --leaf:#4caf7d;
    --leaf-dark:#38855c;
    --accent:#ff8fa3;
    --ink:#3a3a3a;
    --card:#ffffffcc;
    --line:#e3d9c6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Gowun Dodum', sans-serif;
    color:var(--ink);
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-top) 28%, var(--sky-bottom) 70%, #f6e2b8 100%);
    min-height:100vh;
    padding-bottom:60px;
  }
  h1,h2,h3, .display{
    font-family:'Do Hyeon', sans-serif;
    letter-spacing:0.5px;
  }
  /* ---------- Sky / header ---------- */
  .sky{
    position:relative;
    padding:28px 20px 60px;
    text-align:center;
    overflow:hidden;
  }
  .sky .stars{
    position:absolute; inset:0;
    pointer-events:none;
  }
  .star{
    position:absolute;
    font-size:14px;
    opacity:0;
    animation: twinkle 2.4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:.15; transform:scale(0.8);}
    50%{opacity:1; transform:scale(1.15);}
  }
  .title{
    font-size:30px;
    margin:6px 0 2px;
    color:#2f5a4a;
    text-shadow: 0 2px 0 #ffffffaa;
  }
  .subtitle{
    font-size:15px;
    color:#4a6b5c;
    margin:0 0 14px;
  }
  .mission-info{
    display:inline-flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    background:var(--card);
    border:2px solid var(--line);
    border-radius:16px;
    padding:10px 16px;
    font-size:13px;
    box-shadow:0 4px 0 #e3d9c655;
  }
  .mission-info b{color:var(--leaf-dark);}
  .class-sky-bar{
    max-width:420px;
    margin:16px auto 0;
    background:#ffffffaa;
    border:2px solid var(--line);
    border-radius:999px;
    height:22px;
    overflow:hidden;
    position:relative;
  }
  .class-sky-fill{
    height:100%;
    background:linear-gradient(90deg,#ffd76a,#ff8fa3,#8fd3ff);
    border-radius:999px;
    transition:width .5s ease;
  }
  .class-sky-label{
    font-size:12px;
    margin-top:6px;
    color:#4a6b5c;
  }

  /* ---------- Garden bed ---------- */
  .garden-wrap{
    max-width:920px;
    margin:-40px auto 0;
    padding:0 16px;
  }
  .garden-bed{
    background: linear-gradient(180deg, var(--leaf) 0%, var(--leaf-dark) 100%);
    border-radius:24px 24px 40px 40px;
    padding:20px 14px 26px;
    box-shadow: 0 10px 0 #2f6b4a, 0 14px 24px rgba(0,0,0,.15);
    position:relative;
  }
  .garden-bed::before{
    content:"우리반 정원 🌿";
    display:block;
    text-align:center;
    color:#fff;
    font-family:'Do Hyeon', sans-serif;
    font-size:18px;
    margin-bottom:10px;
    text-shadow:0 2px 0 #2f6b4a;
  }
  .pots{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(110px,1fr));
    gap:12px;
  }
  .pot-card{
    background:var(--card);
    border-radius:16px;
    padding:10px 8px 12px;
    text-align:center;
    cursor:pointer;
    border:3px solid transparent;
    transition: transform .15s ease, border-color .15s ease;
    position:relative;
  }
  .pot-card:hover{ transform: translateY(-3px); }
  .pot-card.selected{ border-color: var(--accent); }
  .pot-emoji-stage{
    font-size:40px;
    line-height:1;
    margin-bottom:4px;
    filter: drop-shadow(0 3px 2px rgba(0,0,0,.15));
    transition: transform .2s ease;
  }
  .pot-name{
    font-size:13px;
    font-weight:bold;
  }
  .pot-progress{
    font-size:11px;
    color:#5a5a5a;
    margin-top:2px;
  }
  .pot-bar{
    height:6px;
    background:#e7e0d0;
    border-radius:999px;
    margin-top:6px;
    overflow:hidden;
  }
  .pot-bar-fill{
    height:100%;
    background:var(--accent);
    border-radius:999px;
    transition:width .4s ease;
  }
  .chance-dots{
    margin-top:5px;
    font-size:11px;
  }
  .badge-complete{
    position:absolute;
    top:-8px; right:-6px;
    font-size:18px;
    animation: pop 1.4s ease-in-out infinite;
  }
  @keyframes pop{
    0%,100%{ transform: scale(1) rotate(-6deg);}
    50%{ transform: scale(1.15) rotate(6deg);}
  }

  /* ---------- Detail panel ---------- */
  .detail{
    max-width:920px;
    margin:22px auto 0;
    padding:0 16px;
  }
  .detail-card{
    background:var(--card);
    border-radius:20px;
    border:2px solid var(--line);
    padding:20px;
  }
  .detail-head{
    display:flex;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
  }
  .detail-plant{
    font-size:64px;
    position:relative;
  }
  .detail-name{
    font-size:20px;
    margin:0;
  }
  .detail-stage-label{
    font-size:13px;
    color:#5a6f60;
    margin:2px 0 0;
  }
  .detail-actions{
    margin-left:auto;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  button{
    font-family:'Gowun Dodum', sans-serif;
    font-size:14px;
    border:none;
    border-radius:12px;
    padding:10px 16px;
    cursor:pointer;
    transition: transform .1s ease, filter .15s ease;
  }
  button:active{ transform: scale(0.96); }
  .btn-done{
    background:var(--leaf);
    color:#fff;
    box-shadow:0 3px 0 var(--leaf-dark);
  }
  .btn-done:disabled{
    background:#cdd8ce; color:#7c8a7d;
    box-shadow:0 3px 0 #b7c2b8;
    cursor:not-allowed;
  }
  .btn-chance{
    background:#ffe3a1;
    color:#7a5a12;
    box-shadow:0 3px 0 #e0bd63;
  }
  .btn-chance:disabled{
    background:#eee0c2; color:#a99a76;
    box-shadow:0 3px 0 #d8caa8;
    cursor:not-allowed;
  }
  .calendar{
    margin-top:18px;
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:8px;
  }
  .day-cell{
    aspect-ratio:1/1;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:11px;
    background:#f4efe2;
    border:2px solid var(--line);
    position:relative;
  }
  .day-cell .day-num{
    font-size:10px;
    color:#8a8578;
    position:absolute;
    top:4px; left:6px;
  }
  .day-cell .day-emoji{ font-size:20px; }
  .day-cell.today{ border-color: var(--accent); background:#fff0f3; }
  .day-cell.done{ background:#e3f4e5; border-color: var(--leaf); }
  .day-cell.chance{ background:#fff3d6; border-color:#e0bd63; }
  .day-cell.missed{ background:#fdeaea; border-color:#e39a9a; }
  .day-cell.future{ opacity:.45; }
  .day-cell.clickable{ cursor:pointer; }
  .day-cell.clickable:hover{ transform: translateY(-2px); }

  .legend{
    display:flex; gap:14px; flex-wrap:wrap;
    font-size:12px; margin-top:10px; color:#5a5a5a;
  }
  .legend span{ display:inline-flex; align-items:center; gap:4px;}
  .dot{ width:10px; height:10px; border-radius:3px; display:inline-block;}

  /* ---------- Reset / admin ---------- */
  .btn-reset{
    background:#f0f0f0;
    color:#8a3a3a;
    box-shadow:0 3px 0 #d6cfcf;
    font-size:12px;
    padding:8px 12px;
  }
  .confirm-row{
    margin-top:14px;
    padding:12px;
    background:#fff5f5;
    border:2px dashed #e3a9a9;
    border-radius:12px;
    display:none;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .confirm-row.open{ display:flex; }
  .confirm-row input{
    font-family:'Gowun Dodum', sans-serif;
    font-size:13px;
    padding:8px 10px;
    border-radius:8px;
    border:2px solid #e3a9a9;
    flex:1;
    min-width:140px;
  }
  .confirm-row .hint{
    width:100%;
    font-size:11px;
    color:#a05a5a;
  }
  .btn-confirm-danger{
    background:#e07a7a;
    color:#fff;
    box-shadow:0 3px 0 #b95757;
  }
  .btn-confirm-danger:disabled{
    background:#eecccc; color:#c99;
    box-shadow:0 3px 0 #ddb9b9;
    cursor:not-allowed;
  }
  .btn-cancel{
    background:#e6e6e6;
    color:#555;
    box-shadow:0 3px 0 #ccc;
  }
  .teacher-menu{
    max-width:920px;
    margin:30px auto 0;
    padding:0 16px;
    text-align:center;
  }
  .teacher-toggle{
    background:none;
    border:none;
    color:#8a8a8a;
    font-size:12px;
    text-decoration:underline;
    cursor:pointer;
    padding:4px;
  }
  .teacher-panel{
    display:none;
    max-width:420px;
    margin:10px auto 0;
    background:var(--card);
    border:2px dashed #cbb;
    border-radius:14px;
    padding:14px;
  }
  .teacher-panel.open{ display:block; }

  .confetti-layer{
    position:fixed; inset:0; pointer-events:none; z-index:50;
  }
  .confetti-piece{
    position:absolute;
    font-size:22px;
    animation: floatUp 1.3s ease-out forwards;
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) rotate(0deg); opacity:1;}
    100%{ transform: translateY(-140px) rotate(180deg); opacity:0;}
  }

  .footer-note{
    text-align:center;
    font-size:12px;
    color:#6a6a6a;
    margin-top:26px;
  }
  @media (prefers-reduced-motion: reduce){
    .star, .badge-complete, .confetti-piece{ animation:none !important; }
  }
</style>
</head>
<body>

<div class="sky">
  <div class="stars" id="starsLayer"></div>
  <h1 class="title">🌱 매3비, 함께 키워요 🌱</h1>
  <p class="subtitle">매일 미션을 마치면 우리반 정원이 자라요</p>
  <div class="mission-info">
    <span>📅 <b>7/17 ~ 8/6</b> (21일)</span>
    <span>🌟 참여 <b>7명</b></span>
    <span>⏰ 미루기 찬스 <b>1인 2회</b></span>
  </div>
  <div class="class-sky-bar"><div class="class-sky-fill" id="classFill"></div></div>
  <div class="class-sky-label" id="classLabel">우리반 전체 진행률 불러오는 중...</div>
</div>

<div class="garden-wrap">
  <div class="garden-bed">
    <div class="pots" id="pots"></div>
  </div>
</div>

<div class="detail" id="detailWrap" style="display:none;">
  <div class="detail-card">
    <div class="detail-head">
      <div class="detail-plant" id="detailPlant"></div>
      <div>
        <p class="detail-name" id="detailName"></p>
        <p class="detail-stage-label" id="detailStageLabel"></p>
      </div>
      <div class="detail-actions">
        <button class="btn-done" id="btnDone">오늘 미션 완료! ✅</button>
        <button class="btn-chance" id="btnChance">미루기 찬스 쓰기 ⏰</button>
        <button class="btn-reset" id="btnResetToggle">이 학생 초기화 🔄</button>
      </div>
    </div>
    <div class="confirm-row" id="individualResetRow">
      <span class="hint" id="individualResetHint"></span>
      <input type="text" id="individualResetInput" placeholder="학생 이름을 정확히 입력">
      <button class="btn-confirm-danger" id="individualResetConfirm" disabled>초기화 확정</button>
      <button class="btn-cancel" id="individualResetCancel">취소</button>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="legend">
      <span><i class="dot" style="background:#e3f4e5;border:1px solid #4caf7d;"></i>완료</span>
      <span><i class="dot" style="background:#fff3d6;border:1px solid #e0bd63;"></i>찬스 사용</span>
      <span><i class="dot" style="background:#fdeaea;border:1px solid #e39a9a;"></i>놓친 날</span>
      <span><i class="dot" style="background:#fff0f3;border:1px solid #ff8fa3;"></i>오늘</span>
    </div>
  </div>
</div>

<div class="teacher-menu">
  <button class="teacher-toggle" id="teacherToggle">🔧 선생님 메뉴</button>
  <div class="teacher-panel" id="teacherPanel">
    <p class="hint" style="color:#a05a5a; font-size:12px; margin:0 0 8px;">전체 학생 기록을 초기화합니다. 아래 문구를 정확히 입력하세요.</p>
    <p style="font-size:13px; margin:0 0 8px;">입력 문구: <b>전체초기화</b></p>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <input type="text" id="allResetInput" placeholder="문구 입력" style="flex:1; min-width:140px; padding:8px 10px; border-radius:8px; border:2px solid #e3a9a9; font-family:'Gowun Dodum', sans-serif; font-size:13px;">
      <button class="btn-confirm-danger" id="allResetConfirm" disabled>전체 초기화 실행</button>
    </div>
  </div>
</div>

<p class="footer-note">이 정원은 우리반 친구들과 함께 보는 공간이에요 · 이름을 눌러 자신의 미션을 체크해요</p>
<div class="confetti-layer" id="confettiLayer"></div>

<script>
const STUDENTS = [
  { name:"강현주", emoji:"🌻", label:"해바라기" },
  { name:"김서율", emoji:"🍓", label:"딸기" },
  { name:"고규민", emoji:"🍅", label:"토마토" },
  { name:"곽경준", emoji:"🌸", label:"벚꽃" },
  { name:"김동현", emoji:"🍎", label:"사과" },
  { name:"남윤호", emoji:"🫐", label:"블루베리" },
  { name:"최동하", emoji:"🌷", label:"튤립" },
];
const TOTAL_DAYS = 21;
const MAX_CHANCES = 2;
const START_DATE = new Date(2026, 6, 17); // 2026-07-17 (month is 0-indexed)

// ⚠️ 여기에 본인의 Firebase Realtime Database URL을 붙여넣으세요.
// 예: "https://mission-garden-12345-default-rtdb.firebaseio.com"
const FIREBASE_DB_URL = "https://every-ac99b-default-rtdb.firebaseio.com";

let selected = null;
let studentData = {}; // name -> {days:[...], chancesUsed:0}

function isFirebaseConfigured(){
  return FIREBASE_DB_URL && FIREBASE_DB_URL.startsWith('https://');
}

async function kvGet(key){
  const res = await fetch(`${FIREBASE_DB_URL}/${key}.json`);
  if(!res.ok) throw new Error('불러오기 실패: HTTP ' + res.status);
  return await res.json(); // null if key doesn't exist yet
}

async function kvSet(key, value){
  const res = await fetch(`${FIREBASE_DB_URL}/${key}.json`, {
    method: 'PUT',
    body: JSON.stringify(value)
  });
  if(!res.ok) throw new Error('저장 실패: HTTP ' + res.status);
}

function dateAt(i){
  const d = new Date(START_DATE);
  d.setDate(d.getDate()+i);
  return d;
}
function ymd(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}
function todayYmd(){ return ymd(new Date()); }
function todayIndex(){
  const t = todayYmd();
  for(let i=0;i<TOTAL_DAYS;i++){ if(ymd(dateAt(i))===t) return i; }
  const today = new Date(new Date().toDateString());
  const start = new Date(START_DATE.toDateString());
  const diff = Math.round((today-start)/86400000);
  return diff; // may be <0 (not started) or >=21 (ended)
}

function defaultData(){
  return { days: Array(TOTAL_DAYS).fill('none'), chancesUsed: 0 };
}

async function loadStudent(name){
  try{
    const data = await kvGet('garden/'+encodeURIComponent(name));
    if(data && Array.isArray(data.days) && data.days.length===TOTAL_DAYS){
      return data;
    }
  }catch(e){ console.error('불러오기 실패', e); }
  return defaultData();
}
async function saveStudent(name, data){
  try{
    await kvSet('garden/'+encodeURIComponent(name), data);
  }catch(e){
    console.error('저장 실패', e);
    alert('저장에 실패했어요. 인터넷 연결을 확인하고 다시 눌러주세요.\n('+e.message+')');
  }
}

function countDone(data){
  return data.days.filter(s=>s==='done'||s==='chance').length;
}

function stageInfo(count, theme){
  if(count>=TOTAL_DAYS) return { emoji: theme.emoji, label: theme.label+" 완성! 🎉", scale:1 };
  if(count>=15) return { emoji: theme.emoji, label: "곧 "+theme.label+"이 필 것 같아요", scale:0.85 };
  if(count>=10) return { emoji: "🪴", label: "봉오리가 맺혔어요", scale:1 };
  if(count>=5)  return { emoji: "🌿", label: "쑥쑥 자라는 중", scale:1 };
  if(count>=1)  return { emoji: "🌱", label: "새싹이 텄어요", scale:1 };
  return { emoji: "🌰", label: "아직 씨앗이에요", scale:1 };
}

function themeOf(name){ return STUDENTS.find(s=>s.name===name); }

function renderStars(){
  const layer = document.getElementById('starsLayer');
  layer.innerHTML='';
  let totalDone=0, totalMax = STUDENTS.length*TOTAL_DAYS;
  STUDENTS.forEach(s=>{ totalDone += countDone(studentData[s.name]||defaultData()); });
  const pct = Math.round((totalDone/totalMax)*100);
  document.getElementById('classFill').style.width = pct+'%';
  document.getElementById('classLabel').textContent = `우리반 전체 진행률 ${pct}% (${totalDone}/${totalMax}회) — 다같이 하늘에 별을 채워요`;
  const starCount = Math.round((totalDone/totalMax)*24);
  for(let i=0;i<starCount;i++){
    const el = document.createElement('span');
    el.className='star';
    el.textContent='✨';
    el.style.left = (Math.random()*94+2)+'%';
    el.style.top = (Math.random()*70+4)+'%';
    el.style.animationDelay = (Math.random()*2)+'s';
    layer.appendChild(el);
  }
}

function renderPots(){
  const wrap = document.getElementById('pots');
  wrap.innerHTML='';
  STUDENTS.forEach(s=>{
    const data = studentData[s.name]||defaultData();
    const count = countDone(data);
    const stage = stageInfo(count, s);
    const card = document.createElement('div');
    card.className = 'pot-card' + (selected===s.name?' selected':'');
    card.onclick = ()=> selectStudent(s.name);
    card.innerHTML = `
      ${count>=TOTAL_DAYS?'<div class="badge-complete">🏆</div>':''}
      <div class="pot-emoji-stage">${stage.emoji}</div>
      <div class="pot-name">${s.name}</div>
      <div class="pot-progress">${count}/${TOTAL_DAYS}일</div>
      <div class="pot-bar"><div class="pot-bar-fill" style="width:${(count/TOTAL_DAYS*100)}%"></div></div>
      <div class="chance-dots">${'⏰'.repeat(data.chancesUsed)}${'▫️'.repeat(MAX_CHANCES-data.chancesUsed)}</div>
    `;
    wrap.appendChild(card);
  });
}

function selectStudent(name){
  selected = name;
  document.getElementById('detailWrap').style.display='block';
  renderPots();
  renderDetail();
  document.getElementById('detailWrap').scrollIntoView({behavior:'smooth', block:'start'});
}

function renderDetail(){
  if(!selected) return;
  const s = themeOf(selected);
  const data = studentData[selected]||defaultData();
  const count = countDone(data);
  const stage = stageInfo(count, s);
  document.getElementById('detailPlant').textContent = stage.emoji;
  document.getElementById('detailName').textContent = selected+"님의 "+s.label;
  document.getElementById('detailStageLabel').textContent = stage.label+`  ·  찬스 ${data.chancesUsed}/${MAX_CHANCES} 사용`;

  const tIdx = todayIndex();
  const alreadyDoneToday = tIdx>=0 && tIdx<TOTAL_DAYS && data.days[tIdx]!=='none';
  const inRange = tIdx>=0 && tIdx<TOTAL_DAYS;
  const btnDone = document.getElementById('btnDone');
  btnDone.disabled = !inRange || alreadyDoneToday;
  btnDone.textContent = alreadyDoneToday ? "오늘은 이미 완료했어요 🌿" : (inRange? "오늘 미션 완료! ✅" : "미션 기간이 아니에요");
  btnDone.onclick = ()=> markDone(selected, tIdx);

  // chance usable if there's any missed past day and chances remain
  const hasMissed = data.days.some((v,i)=> i<tIdx && v==='none');
  const btnChance = document.getElementById('btnChance');
  btnChance.disabled = !(hasMissed && data.chancesUsed<MAX_CHANCES);
  btnChance.textContent = data.chancesUsed>=MAX_CHANCES ? "찬스를 모두 썼어요" : "미루기 찬스 쓰기 ⏰";
  btnChance.onclick = ()=> useChance(selected, tIdx);

  const cal = document.getElementById('calendar');
  cal.innerHTML='';
  for(let i=0;i<TOTAL_DAYS;i++){
    const d = dateAt(i);
    const status = data.days[i];
    const cell = document.createElement('div');
    let cls = 'day-cell';
    if(i===tIdx) cls+=' today';
    if(status==='done') cls+=' done';
    else if(status==='chance') cls+=' chance';
    else if(tIdx>=0 && i<tIdx && status==='none') cls+=' missed';
    else if(tIdx>=0 && i>tIdx) cls+=' future';
    let emoji = '·';
    if(status==='done') emoji='✅';
    else if(status==='chance') emoji='⏰';
    else if(tIdx>=0 && i<tIdx) emoji='😶';
    else if(i===tIdx) emoji='👉';
    cell.className = cls;
    cell.innerHTML = `<span class="day-num">${d.getMonth()+1}/${d.getDate()}</span><span class="day-emoji">${emoji}</span>`;
    cal.appendChild(cell);
  }
}

function burstConfetti(){
  const layer = document.getElementById('confettiLayer');
  const emojis = ['🌟','🎉','✨','🍀'];
  for(let i=0;i<12;i++){
    const el = document.createElement('span');
    el.className='confetti-piece';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = (Math.random()*100)+'%';
    el.style.top = (40+Math.random()*30)+'%';
    el.style.animationDelay = (Math.random()*0.3)+'s';
    layer.appendChild(el);
    setTimeout(()=>el.remove(), 1600);
  }
}

async function markDone(name, idx){
  if(idx<0 || idx>=TOTAL_DAYS) return;
  const data = studentData[name];
  if(data.days[idx]!=='none') return;
  data.days[idx]='done';
  await saveStudent(name, data);
  burstConfetti();
  renderPots(); renderStars(); renderDetail();
}

async function useChance(name, tIdx){
  const data = studentData[name];
  if(data.chancesUsed>=MAX_CHANCES) return;
  // find most recent missed day before today
  let target=-1;
  for(let i=tIdx-1;i>=0;i--){ if(data.days[i]==='none'){ target=i; break; } }
  if(target<0) return;
  data.days[target]='chance';
  data.chancesUsed += 1;
  await saveStudent(name, data);
  renderPots(); renderStars(); renderDetail();
}

async function resetStudent(name){
  studentData[name] = defaultData();
  await saveStudent(name, studentData[name]);
  renderPots(); renderStars(); renderDetail();
}

async function resetAll(){
  await Promise.all(STUDENTS.map(async s=>{
    studentData[s.name] = defaultData();
    await saveStudent(s.name, studentData[s.name]);
  }));
  renderPots(); renderStars();
  if(selected) renderDetail();
}

function wireResetControls(){
  const toggleBtn = document.getElementById('btnResetToggle');
  const row = document.getElementById('individualResetRow');
  const hint = document.getElementById('individualResetHint');
  const input = document.getElementById('individualResetInput');
  const confirmBtn = document.getElementById('individualResetConfirm');
  const cancelBtn = document.getElementById('individualResetCancel');

  toggleBtn.onclick = ()=>{
    hint.textContent = `'${selected}' 라고 정확히 입력하면 이 학생의 기록이 전부 사라져요.`;
    input.value='';
    confirmBtn.disabled = true;
    row.classList.add('open');
    input.focus();
  };
  cancelBtn.onclick = ()=>{ row.classList.remove('open'); };
  input.oninput = ()=>{ confirmBtn.disabled = (input.value !== selected); };
  confirmBtn.onclick = async ()=>{
    if(input.value !== selected) return;
    await resetStudent(selected);
    row.classList.remove('open');
  };

  const teacherToggle = document.getElementById('teacherToggle');
  const teacherPanel = document.getElementById('teacherPanel');
  const allInput = document.getElementById('allResetInput');
  const allConfirm = document.getElementById('allResetConfirm');
  const ALL_RESET_PHRASE = '전체초기화';

  teacherToggle.onclick = ()=>{
    teacherPanel.classList.toggle('open');
    allInput.value='';
    allConfirm.disabled = true;
  };
  allInput.oninput = ()=>{ allConfirm.disabled = (allInput.value !== ALL_RESET_PHRASE); };
  allConfirm.onclick = async ()=>{
    if(allInput.value !== ALL_RESET_PHRASE) return;
    await resetAll();
    teacherPanel.classList.remove('open');
  };
}

async function init(){
  if(!isFirebaseConfigured()){
    const warn = document.createElement('div');
    warn.style.cssText = 'background:#fdeaea;color:#a33;padding:14px 18px;text-align:center;font-size:14px;border-bottom:3px solid #e39a9a;';
    warn.innerHTML = '⚠️ 아직 Firebase 데이터베이스 주소가 설정되지 않았어요. 코드 안의 <b>FIREBASE_DB_URL</b> 부분을 본인의 Firebase Realtime Database 주소로 바꿔주세요. (지금은 저장이 되지 않아요)';
    document.body.prepend(warn);
  }
  const results = await Promise.all(STUDENTS.map(s=>loadStudent(s.name)));
  STUDENTS.forEach((s,i)=>{ studentData[s.name]=results[i]; });
  renderStars();
  renderPots();
  wireResetControls();
}
init();
</script>
